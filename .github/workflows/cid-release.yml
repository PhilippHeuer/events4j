# cid-workflow-version: 0.11.1

# This file is generated by the CID Workflow GitHub App.
# DO NOT EDIT!

# name
name: 'CI - Release'

# triggers
on:
  workflow_dispatch:
    inputs:
      loglevel:
        description: Log level
        required: true
        default: info
        type: choice
        options:
          - trace
          - debug
          - info
          - warn
          - error
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - 'renovate.json'
      - 'CODEOWNERS'
      - 'SECURITY.md'

# permissions, see https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#permissions and https://docs.github.com/en/rest/overview/permissions-required-for-github-apps
permissions:
  actions: read # required: detect GitHub Actions runtime environment
  checks: none # not required
  contents: read # required: read repository content
  deployments: none # not required
  id-token: none # not required
  issues: none # not required
  packages: none # not required
  pages: none # not required
  pull-requests: none # not required
  repository-projects: none # not required
  security-events: none # not required
  statuses: none # not required

# cancel in progress when a new run starts
concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

env:
  CID_WORKFLOW: 'main'
  CID_LOGLEVEL: "${{ github.event.inputs.loglevel || 'info' }}"
  # allowed modes are 'block' and 'audit'. Using https://github.com/step-security/harden-runner to harden the runner.
  EGRESS_POLICY: 'block'

